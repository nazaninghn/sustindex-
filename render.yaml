databases:
  - name: sustindex-db
    databaseName: sustindex
    user: sustindex

services:
  - type: web
    name: sustindex
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sustindex.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sustindex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4